name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (pyright)
        run: uv run pyright

      - name: Test (pytest)
        run: uv run pytest
